# Cost Policy — scales the pipeline to task complexity, purely to conserve
# free-tier quota (OpenRouter free models, Ollama Cloud free tier). This is
# separate from review_policy.yaml: cost_policy decides WHICH STAGES run at all
# (Research? Security pass?), review_policy decides WHICH REVIEWER PASSES run
# once you're already at the review stage.

complexity_levels:

  low:
    description: "Single-file fix, typo, trivial config change, no unfamiliar APIs"
    pipeline: [planner_optional, developer, review]
    review_policy: trivial

  medium:
    description: "Normal feature/bugfix touching 1-3 files, may need a version check"
    pipeline: [planner, research_if_needed, developer, review]
    review_policy: normal

  high:
    description: >
      New feature spanning multiple layers/services, unfamiliar library, or
      anything matching review_policy's security/performance/architecture
      keyword sets.
    pipeline: [planner, research, developer, review_with_specialized_passes]
    review_policy: "(inherited from review_policy.yaml keyword match — security/performance/architecture)"

# How complexity is assigned:
# - Orchestrator/Planner estimate complexity from: number of files likely touched,
#   whether an unfamiliar library/framework version is involved, and whether the
#   task matches review_policy's security/performance/architecture keywords (any
#   match automatically pushes complexity to at least `high`).
# - Default to `medium` when unsure — `low` should only be used when the task is
#   visibly trivial (one line, no logic change), to avoid under-reviewing real changes.
#
# Effect of this file vs. review_policy.yaml:
# - cost_policy.yaml controls whether Research/Planner run at all (saves a model
#   call entirely).
# - review_policy.yaml controls how many Reviewer passes run once you're already
#   reviewing (saves model calls at the review stage specifically).
# They compose, but security/performance/architecture keyword matches always win:
# if a task's content matches review_policy's security keywords (even a one-line
# change to an auth check), complexity is never `low` — bump it to at least
# `medium` so the corresponding review pass actually runs. Cost savings should
# never come at the expense of skipping a security-relevant review.
