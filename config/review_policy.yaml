# Review Policy — Planner picks a POLICY, not individual reviewer agents.
# Each policy is a list of review passes Reviewer runs, in order, using the
# profile named in config/profiles/<name>.yaml. There is still only one
# Reviewer agent — these are modes/passes it runs, not separate persistent agents.

policies:

  trivial:
    description: "One-line fixes, typos, comment changes — no functional risk"
    reviewers: [review]

  normal:
    description: "Default for ~90% of tasks: ordinary bug fixes and small features"
    reviewers: [review]

  security:
    description: >
      Auth, payments, cryptography, raw SQL, public API endpoints, anything
      handling secrets or user-supplied input that reaches a privileged operation.
    reviewers: [review, security]

  performance:
    description: >
      SQL/query optimization, Redis/caching, queues, Go concurrency, anything
      explicitly about throughput/latency.
    reviewers: [review, performance]

  architecture:
    description: "Significant structural changes, new services, cross-cutting refactors"
    reviewers: [review, security, architecture]

  consensus:
    description: >
      Used only when Reviewer's own verdict is uncertain (see "tie-break" below),
      or when Planner explicitly flags a change as critical. Most expensive policy
      in free-tier quota — use sparingly.
    reviewers: [review, security, performance]

# How Planner chooses a policy:
# - Default to `normal` unless the task clearly matches one of the keyword sets below.
# - security keywords: auth, login, password, token, jwt, payment, crypto, encrypt,
#   sql (raw query), api key, secret, permission, access control, public endpoint.
# - performance keywords: slow, N+1, query optimization, redis, cache, queue,
#   goroutine, concurrency, throughput, latency, index.
# - architecture keywords: new service, refactor across modules, breaking change,
#   major version bump, restructure.
# - If a task matches more than one category, use the more expensive matching
#   policy (architecture > consensus > security/performance > normal).

# Tie-break rule (cheap alternative to running a second full review):
# If Reviewer's verdict is REJECT but its own confidence in the verdict is low
# (vague/contradictory notes, or Reviewer says so explicitly), Orchestrator may
# escalate by asking ONE additional model a single focused question:
# "Given this diff and these two sets of notes, who is right?" — this is NOT
# a new full review pass, just a one-shot tie-break, and should use a third
# profile distinct from both CODING and REVIEW (e.g. CODING_ALT's model).
