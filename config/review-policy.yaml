# Review policies — what passes Reviewer runs.
# Triggered by review_policy field from Planner/Orchestrator.
# Each pass = one model profile (must differ from CODING).

policies:

  trivial:
    description: one-line fixes, typos
    passes: [review]
    max_cycles: 1

  normal:
    description: default for ordinary feature/bugfix
    passes: [review]
    max_cycles: 3

  security:
    description: auth, payment, crypto, raw SQL, secrets
    passes: [review, security]
    keywords: [auth, password, token, jwt, payment, crypto, secret, permission]
    max_cycles: 3

  performance:
    description: N+1, redis, queue, goroutine, cache
    passes: [review, performance]
    keywords: [slow, n+1, redis, cache, queue, goroutine, latency, index]
    max_cycles: 3

  architecture:
    description: new service, cross-module refactor, breaking change
    passes: [review, security, architecture]
    keywords: [new service, refactor across, breaking change, major version]
    max_cycles: 3

# Tie-break: if a pass returns Confidence: low, the orchestrator MUST ask a
# third model a single focused question (not a full pass). This is not
# optional — "may trigger" in v0.8 became "must trigger" in v0.9.
tie_break:
  enabled: true
  trigger: confidence == low
  profile: tiebreak
  question_template: |
    Given this diff and these two notes, who is right?
    Diff: {diff}
    Notes A (executor): {notes_a}
    Notes B (reviewer): {notes_b}
