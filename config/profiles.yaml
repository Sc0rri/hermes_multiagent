# Hermes Developer Pack — Model Profiles
# Agent prompts never reference specific models — only profile names
# (FAST / CODING / CODING_ALT / REVIEW / REASONING / RESEARCH / DOCS).
# If a free model disappears from OpenRouter or Ollama Cloud, only this file changes.

profiles:

  FAST:
    description: "Quick, light tasks: intent classification, routing, short edits"
    primary:  { provider: openrouter, model: "qwen/qwen3-14b:free" }
    fallback: { provider: ollama_cloud, model: "qwen3:8b" }

  CODING:
    description: "Primary code writer (PHP/Go agent)"
    primary:  { provider: openrouter, model: "deepseek/deepseek-chat-v3.1:free" }
    fallback: { provider: ollama_cloud, model: "qwen2.5-coder:32b" }

  CODING_ALT:
    description: "Alternate coding model — for a second opinion / hard tasks (must differ from CODING!)"
    primary:  { provider: openrouter, model: "qwen/qwen3-coder:free" }
    fallback: { provider: ollama_cloud, model: "deepseek-coder-v2:16b" }

  REVIEW:
    description: "Reviewer — MUST be a different model/family than CODING, so it doesn't repeat the same mistakes"
    primary:  { provider: openrouter, model: "google/gemma-3-27b-it:free" }
    fallback: { provider: ollama_cloud, model: "gemma3:27b" }

  REASONING:
    description: "Complex decomposition, architectural decisions (Planner)"
    primary:  { provider: openrouter, model: "deepseek/deepseek-r1:free" }
    fallback: { provider: ollama_cloud, model: "qwen3:32b-thinking" }

  RESEARCH:
    description: "Looking up current documentation / best practices"
    primary:  { provider: openrouter, model: "meta-llama/llama-3.3-70b-instruct:free" }
    fallback: { provider: ollama_cloud, model: "llama3.3:70b" }

  DOCS:
    description: "Documentation, README, CHANGELOG — stable, coherent prose"
    primary:  { provider: openrouter, model: "mistralai/mistral-small-3.1-24b-instruct:free" }
    fallback: { provider: ollama_cloud, model: "mistral-small:24b" }

# Fallback rule:
# 1. Try primary.
# 2. On error/rate limit/timeout -> fallback.
# 3. If both are unavailable -> Orchestrator informs the user and suggests waiting
#    or manually switching the profile.
#
# Note: OpenRouter's free model list (https://openrouter.ai/openrouter/free) changes
# over time. Verify the current :free slugs before using this pack and update this file.
