name: fullstack-php-go-rust
version: 0.18.0
description: "Full-stack dev pack (PHP/Yii2/Laravel/OpenCart 2.x, Go, Rust). Orchestrator profile dispatches to sub-profiles via terminal."
hermes_requires: ">=0.16.0"
author: "Sc0rri"
license: MIT
distribution_owned:
  - SOUL.md
  - skills/
  - scripts/
  - distribution.yaml
  - README.md
env_requires:
  - name: OPENROUTER_API_KEY
    description: "OpenRouter API key (free tier works)"
    required: false
  - name: OLLAMA_API_KEY
    description: "Ollama Cloud API key (optional)"
    required: false
    default: ""